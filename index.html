<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>九九マスター</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      @keyframes pop { 0% { transform: scale(0.95); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
      .animate-pop { animation: pop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
      @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }
      .shake { animation: shake 0.3s; }

      body { touch-action: none; background-color: #f0fdf4; overflow: hidden; height: 100dvh; width: 100vw; }
      #root { height: 100%; width: 100%; }

      .scroll-y { overflow-y: auto; -webkit-overflow-scrolling: touch; }
      ::-webkit-scrollbar { width: 4px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 2px; }
    </style>
  </head>
  <body class="text-slate-700 font-sans select-none">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
